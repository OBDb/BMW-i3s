generations:
  - name: "First Generation (I01, 2018-2019)"
    start_year: 2018
    end_year: 2019
    description: "The BMW i3s was introduced for the 2018 model year as the sportier variant of the standard i3 electric hatchback. Announced in 2017, the i3s debuted with the first facelift of the i3 platform, featuring refreshed exterior styling including a new front bumper, horizontal turn signal light openings, standard LED headlights, and a revised rear bumper. The i3s was distinguished by more aggressive blacked-out chrome accents compared to the standard i3. The i3s featured a more powerful electric motor producing 181 HP (184 HP later) versus 170 HP in the standard i3, with 199 lb-ft of torque. Visual distinctions included wider fenders with flared wheel arches to accommodate a 40mm wider track, exclusive 20-inch Style 431 double-spoke wheels (20mm wider tires than standard), and a more aggressive stance. The suspension was lowered and sport-tuned for improved handling, with a specific Sport driving mode enhancing throttle response. Available with either a pure battery electric drivetrain or optional range extender gasoline engine, the i3s maintained compatibility with the same 94 Ah / 33 kWh battery system introduced for 2017, with the larger 120 Ah / 42.2 kWh pack becoming standard from 2019 onwards."
  - name: "First Generation (I01, 2019-2022)"
    start_year: 2019
    end_year: 2022
    description: "The i3s continued production through 2022 with the introduction of the larger 120 Ah / 42.2 kWh battery pack in 2019. This battery provided 153 miles of EPA range, a significant upgrade from the earlier 94 Ah battery's 114-mile range. For the 2019 model year, BMW discontinued the Range Extender (REx) version of the i3 in Europe, though the REx remained available in other markets. The i3s maintained its sport-oriented features including the lowered and sport-tuned suspension, Sport drive mode, and exclusive 20-inch wheels. In June 2021, BMW announced the discontinuation of i3 sales in the US after the 2021 model year, with US production ending in July 2021. Global production of all i3 models, including the i3s, was scheduled to end in July 2022, with a total of 250,000 units produced across both standard i3 and i3s variants from 2013 to 2022. The i3s represented BMW's approach to combining electric vehicle efficiency with traditional driving dynamics and performance characteristics."
